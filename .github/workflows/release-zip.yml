name: Build plugin ZIP and attach to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install gettext
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext zip rsync

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_STRIPPED="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_STRIPPED}" >> "$GITHUB_OUTPUT"

      - name: Create plugin zip
        id: zip
        run: |
          ZIP_NAME="referrertracker-${{ steps.version.outputs.version }}.zip"

          BUILD_DIR="$(mktemp -d)"
          PLUGIN_DIR="$BUILD_DIR/referrertracker"
          mkdir -p "$PLUGIN_DIR"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.*' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='referrertracker-*.zip' \
            ./ "$PLUGIN_DIR/"

          if [ -d "$PLUGIN_DIR/languages" ]; then
            for po in "$PLUGIN_DIR"/languages/*.po; do
              if [ -f "$po" ]; then
                mo="${po%.po}.mo"
                msgfmt "$po" -o "$mo"
              fi
            done
          fi

          (cd "$BUILD_DIR" && zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" referrertracker)

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" "${{ steps.zip.outputs.zip_name }}" --clobber
